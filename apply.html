<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apply | Campus Finance</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="apply-body">
  <div id="thankYouModal" class="thank-you-modal hidden">
    <div class="thank-you-card">
      <img src="logo.png" alt="Campus Finance Logo" class="thank-logo" />
      <h2>Application received</h2>
      <p>Thank you. Your application has been submitted successfully.</p>
      <a href="index.html" class="primary-btn small-btn">Back home</a>
    </div>
  </div>

  <main class="apply-page">
    <header class="site-header">
      <a href="index.html" class="logo-wrap">
        <img src="logo.png" alt="Campus Finance Logo" class="logo" />
      </a>
      <a href="index.html" class="header-link">Home</a>
    </header>

    <section class="apply-top">
      <h1>Apply</h1>
      <p>Select your student funding type.</p>
    </section>

    <section class="loan-options">
      <button type="button" class="loan-card active" data-type="NSFAS" data-loan="500" data-total="650" data-months="1">
        <span class="loan-student">NSFAS</span>
        <strong>R500</strong>
        <small>Repay R650</small>
      </button>

      <button type="button" class="loan-card" data-type="Bursary" data-loan="1000" data-total="1300" data-months="1">
        <span class="loan-student">Bursary</span>
        <strong>R1000</strong>
        <small>Repay R1300</small>
      </button>
    </section>

    <section class="summary-card">
      <div>
        <p class="summary-label">Selected offer</p>
        <h2 id="selectedType">NSFAS · R500</h2>
      </div>
      <div class="summary-right">
        <p id="selectedRepayment">Repay R650</p>
        <span id="selectedTerm">1 month · 30% interest</span>
      </div>
    </section>

    <section class="form-card">
      <form action="https://formspree.io/f/mreybwpd" method="POST">
        <input type="hidden" name="_subject" value="New Campus Finance Application" />
        <input type="hidden" name="_next" value="https://campusfinance.co.za/apply.html?submitted=1" />

        <input type="hidden" name="student_funding_type" id="studentTypeInput" value="NSFAS" />
        <input type="hidden" name="loan_amount" id="loanAmountInput" value="500" />
        <input type="hidden" name="repayment_total" id="repaymentTotalInput" value="650" />
        <input type="hidden" name="repayment_term" id="repaymentTermInput" value="1 month" />
        <input type="hidden" name="interest_rate" value="30%" />

        <div class="field">
          <label for="fullname">Full name</label>
          <input type="text" id="fullname" name="full_name" required />
        </div>

        <div class="field">
          <label for="studentnumber">Student number</label>
          <input type="text" id="studentnumber" name="student_number" required />
        </div>

        <div class="field">
          <label for="phone">Phone</label>
          <input type="tel" id="phone" name="phone" required />
        </div>

        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required />
        </div>

        <div class="field full">
          <label for="reason">Reason</label>
          <textarea id="reason" name="reason" rows="4" required></textarea>
        </div>

        <div class="field full checkbox-row">
          <input type="checkbox" id="confirm" required />
          <label for="confirm">I understand the repayment amount and 1 month term.</label>
        </div>

        <button type="submit" class="primary-btn full-btn">Submit application</button>
      </form>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
