<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CampusFinance</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="landing-body">
  <main class="hero">
    <nav class="topbar">
      <div class="brand">
        <span class="brand-main">campusfinance</span>
        <span class="brand-badge">24</span>
      </div>
      <a class="nav-btn" href="apply.html">Apply</a>
    </nav>

    <section class="hero-content">
      <p class="eyebrow">Student emergency funds</p>
      <h1>Need a quick student loan?</h1>
      <p class="hero-text">
        Simple. Fast. Student-friendly.
      </p>

      <div class="offer-card">
        <p class="offer-label">From</p>
        <h2>R500 to R1500</h2>
        <p class="offer-sub">Clear repayment terms. No clutter.</p>
      </div>

      <div class="mini-offers">
        <div class="mini-card">
          <strong>R500</strong>
          <span>Repay R650</span>
        </div>
        <div class="mini-card">
          <strong>R1000</strong>
          <span>Repay R1300</span>
        </div>
        <div class="mini-card">
          <strong>R1500</strong>
          <span>Repay R1950</span>
        </div>
      </div>

      <div class="hero-actions">
        <a class="primary-btn" href="apply.html">Apply now</a>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
