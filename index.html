<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campus Finance</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="landing-page">
    <header class="site-header">
      <a href="index.html" class="logo-wrap">
        <img src="logo.png" alt="Campus Finance Logo" class="logo" />
      </a>
      <a href="apply.html" class="header-btn">Apply</a>
    </header>

    <section class="hero">
      <div class="hero-card">
        <p class="eyebrow">SAFE. SIMPLE. STUDENT FINANCE</p>
        <h1>Short-term student support when you need it most.</h1>
        <p class="hero-text">
          Minimal. Clear. Fast.
        </p>

        <div class="hero-actions">
          <a href="apply.html" class="primary-btn">Apply now</a>
        </div>
      </div>
    </section>

    <section class="offers">
      <div class="offer-box">
        <span class="offer-type">NSFAS students</span>
        <h2>R500</h2>
        <p>Repay R650 in 1 month</p>
      </div>

      <div class="offer-box">
        <span class="offer-type">Bursary students</span>
        <h2>R1000</h2>
        <p>Repay R1300 in 1 month</p>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
