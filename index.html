<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campus Finance</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="home-page">
  <header class="site-header">
    <a href="index.html" class="logo-link">
      <img src="logo.png" alt="Campus Finance" class="logo main-logo" />
    </a>

    <a href="apply.html" class="header-btn">Apply</a>
  </header>

  <main class="hero-layout">
    <section class="hero-left">
      <div class="hero-copy">
        <div class="mini-logo-row">
          <img src="logo.png" alt="Campus Finance" class="logo small-logo" />
        </div>

        <p class="eyebrow">STUDENT FINANCE</p>
        <h1>Simple student funding.</h1>
        <p class="hero-text">
          Clear offers. Fast application. Minimal process.
        </p>

        <div class="hero-actions">
          <a href="apply.html" class="primary-btn">Apply now</a>
        </div>
      </div>
    </section>

    <section class="hero-right">
      <div class="hero-panel">
        <img src="logo.png" alt="Campus Finance" class="panel-logo" />

        <div class="offer-list">
          <div class="offer-card">
            <span class="offer-label">NSFAS students</span>
            <h2>R500</h2>
            <p>Repay R650 in 1 month</p>
          </div>

          <div class="offer-card">
            <span class="offer-label">Bursary students</span>
            <h2>R1000</h2>
            <p>Repay R1300 in 1 month</p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
