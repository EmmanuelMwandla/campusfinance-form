<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campus Finance</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="home-page">
  <header class="site-nav site-nav-home">
    <a href="index.html" class="brand">
      <img src="logo.png" alt="Campus Finance" class="brand-logo" />
    </a>

    <nav class="nav-links">
      <a href="apply.html" class="nav-btn">Apply now</a>
    </nav>
  </header>

  <main class="fullscreen-hero">
    <section class="hero-left">
      <div class="hero-copy">
        <p class="mini-label">SAFE. SIMPLE. STUDENT FINANCE</p>
        <h1>Professional student finance, built for urgent needs.</h1>
        <p class="hero-subtext">
          Short-term support for eligible students with clear repayment terms.
        </p>

        <div class="hero-actions">
          <a href="apply.html" class="primary-btn">Apply now</a>
        </div>
      </div>
    </section>

    <section class="hero-right">
      <div class="glass-panel">
        <img src="logo.png" alt="Campus Finance logo" class="panel-logo" />

        <div class="offers-panel">
          <article class="offer-item">
            <span class="offer-tag">NSFAS</span>
            <h2>R500</h2>
            <p>Repay R650 in 1 month</p>
          </article>

          <article class="offer-item">
            <span class="offer-tag">Bursary</span>
            <h2>R1000</h2>
            <p>Repay R1300 in 1 month</p>
          </article>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
