<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campus Finance</title>

<link rel="icon" type="image/png" href="favicon.png">
<link rel="stylesheet" href="style.css">

</head>

<body>

<main class="single-page-layout">

<!-- LEFT SIDE -->

<section class="apply-left">

<img src="logo.PNG" class="summary-logo">

<p class="eyebrow">SELECTED OFFER</p>

<div class="offer-summary-text">

<p class="offer-option" id="selectedOption">Option 1</p>

<h1 id="selectedBorrow">Borrow R500</h1>

<div class="summary-amount" id="selectedRepayment">Repay R650</div>

<p class="summary-note" id="selectedTerm">Repayment period: 1 month</p>

</div>

<div class="loan-selector">

<button class="loan-card active"
data-option="Option 1"
data-loan="500"
data-total="650"
data-months="1">

<span>Option 1</span>
<strong>R500</strong>
<small>Repay R650</small>

</button>

<button class="loan-card"
data-option="Option 2"
data-loan="1000"
data-total="1300"
data-months="1">

<span>Option 2</span>
<strong>R1000</strong>
<small>Repay R1300</small>

</button>

</div>

</section>

<!-- RIGHT SIDE -->

<section class="apply-right">

<div class="form-panel">

<div class="form-top">

<img src="logo.PNG" class="form-logo">

<h2>Apply</h2>

</div>

<form id="loanForm">

<div class="field">

<label>Full name</label>
<input type="text" required>

</div>

<div class="field">

<label>Student number</label>
<input type="text" required>

</div>

<div class="field">

<label>Phone</label>
<input type="tel" required>

</div>

<div class="field">

<label>Email</label>
<input type="email" required>

</div>

<div class="field">

<label>Reason</label>
<textarea required></textarea>

</div>

<div class="field checkbox-row">

<input type="checkbox" required>
<label>I understand the repayment amount and 1 month repayment period.</label>

</div>

<button class="primary-btn full-btn">

Submit application

</button>

</form>

</div>

</section>

</main>

<script src="script.js"></script>

</body>
</html>
